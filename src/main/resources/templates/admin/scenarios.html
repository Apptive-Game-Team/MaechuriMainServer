<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Scenarios</title>
</head>
<body>
<div th:replace="~{admin/layout :: layout(~{::.container})}">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>Scenarios</h1>
            <a href="/admin/scenarios/generate" class="btn btn-success">Generate New Scenario</a>
        </div>
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Theme</th>
                <th>Difficulty</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="scenario : ${scenarios}">
                <td th:text="${scenario.scenarioId}"></td>
                <td th:text="${scenario.theme}"></td>
                <td th:text="${scenario.difficulty}"></td>
                <td>
                    <form class="d-flex gap-2 align-items-center scenario-date-form"
                          th:data-scenario-id="${scenario.scenarioId}">
                        <input type="date" class="form-control form-control-sm scenario-date-input"
                               style="width:160px"
                               th:value="${scenario.date}"/>
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Set</button>
                        <button type="button" class="btn btn-outline-danger btn-sm scenario-date-clear">Clear</button>
                    </form>
                </td>
                <td>
                    <a th:href="@{/admin/scenarios/{id}(id=${scenario.scenarioId})}" class="btn btn-primary btn-sm">View</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script>
    document.querySelectorAll('.scenario-date-form').forEach(form => {
        const scenarioId = form.dataset.scenarioId;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const dateValue = form.querySelector('.scenario-date-input').value;
            await setDate(scenarioId, dateValue || null, null);
        });

        form.querySelector('.scenario-date-clear').addEventListener('click', async () => {
            await setDate(scenarioId, null, form.querySelector('.scenario-date-input'));
        });
    });

    async function setDate(scenarioId, date, inputToClear) {
        try {
            const res = await fetch(`/admin/scenarios/${scenarioId}/date`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({date: date}),
            });
            if (res.ok) {
                if (inputToClear) inputToClear.value = '';
                alert('Date updated successfully.');
            } else {
                alert('Failed to update date.');
            }
        } catch (e) {
            alert('Error: ' + e.message);
        }
    }
</script>
</body>
</html>
